name: Playwright Tests

on:
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Record Start Time
        run: echo "START_TIME=$(date +%s)" >> $GITHUB_ENV

      - name: Run Playwright Tests
        id: tests
        run: npm test

      - name: Calculate Duration
        if: always()
        run: |
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - START_TIME))
          echo "DURATION=$DURATION" >> $GITHUB_ENV

      - name: Notify Slack Success
        if: success()
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "✅ Playwright Tests Passed

                📦 Repository: ${{ github.repository }}

                🔀 PR #${{ github.event.pull_request.number }}
                📝 Title: ${{ github.event.pull_request.title }}
                👤 Author: ${{ github.event.pull_request.user.login }}
                🌿 Branch: ${{ github.head_ref }}

                ⏱ Duration: ${{ env.DURATION }} seconds

                🔗 PR:
                ${{ github.event.pull_request.html_url }}

                🔗 Workflow:
                https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }

      - name: Notify Slack Failure
        if: failure()
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "❌ Playwright Tests Failed

              📦 Repository: ${{ github.repository }}

              🔀 PR #${{ github.event.pull_request.number }}
              📝 Title: ${{ github.event.pull_request.title }}
              👤 Author: ${{ github.event.pull_request.user.login }}
              🌿 Branch: ${{ github.head_ref }}

              ⏱ Duration: ${{ env.DURATION }} seconds

              🔗 PR:
              ${{ github.event.pull_request.html_url }}

              🔗 Workflow:
              https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }

      - name: Verify Qase Secrets
        run: |
          if [ -n "$QASE_TESTOPS_API_TOKEN" ]; then
            echo "✅ QASE_API_TOKEN is configured"
          else
            echo "❌ QASE_API_TOKEN is missing"
            exit 1
          fi

          if [ -n "$QASE_TESTOPS_PROJECT" ]; then
            echo "✅ QASE_PROJECT_CODE is configured"
          else
            echo "❌ QASE_PROJECT_CODE is missing"
            exit 1
          fi
        env:
          QASE_TESTOPS_API_TOKEN: ${{ secrets.QASE_API_TOKEN }}
          QASE_TESTOPS_PROJECT: ${{ secrets.QASE_PROJECT_CODE }}
 
      - name: Check Token Length
        run: |
          echo "Token length: ${#QASE_TESTOPS_API_TOKEN}"
        env:
          QASE_TESTOPS_API_TOKEN: ${{ secrets.QASE_API_TOKEN }}

      - name: Verify Project Code
        run: |
          echo "Project: $QASE_TESTOPS_PROJECT"
        env:
          QASE_TESTOPS_PROJECT: ${{ secrets.QASE_PROJECT_CODE }}

